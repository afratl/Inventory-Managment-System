{% extends "base.html" %}
{% block title %}URUNLER{% endblock title %}
{% block content %}

<!-- Arama ve Filtreleme Formu -->
<form method="GET" action="{% url 'product_list' %}">
  <input type="text" name="q" placeholder="Ürün Ara" value="{{ request.GET.q }}">
  <select name="category">
      <option value="">Kategori Seç</option>
      {% for category in categories %}
      <option value="{{ category.id }}" {% if request.GET.category == category.id|stringformat:"s" %}selected{% endif %}>
          {{ category.name }}
      </option>
      {% endfor %}
  </select>

  <button type="submit">Ara</button>
  <a href="{% url 'product_list' %}" class="btn btn-info">Temizle</a>
</form>

{% for product in products %}
<div class="card text-left">

  <div class="card-body">
    <h4 class="card-title">{{product.name}}</h4>
    <h6 class="card-title">{{product.category}}</h6>
 
  </div>

    <div class="card-footer">
        <a href="{% url 'product_detail' product.id %}" class="btn btn-primary">Detay</a>
</div>

 
 {% empty %}
    <li>Hiçbir kayıt bulunamadı.</li>
  {% endfor %}
{% endblock content %}
