{% extends "base.html" %}
{% block title %}SATISLAR{% endblock title %}
{% block content %}

<!-- Arama ve Filtreleme Formu -->
<form method="GET" action="{% url 'sales_list' %}">
  <input type="text" name="q" placeholder="Marka Ara" value="{{ request.GET.q }}">
  <select name="brand">
      <option value="">Marka Seç</option>
      {% for brand in brands %}
      <option value="{{ brand.id }}" {% if request.GET.brand == brand.id|stringformat:"s" %}selected{% endif %}>
          {{ brand.name }}
      </option>
      {% endfor %}
  </select>
  <button type="submit">Ara</button>
  <a href="{% url 'sales_list' %}" class="btn btn-info">Temizle</a>
</form>

{% for sale in sales %}
<div class="card text-left">

  <div class="card-body">
    <h4 class="card-title">{{sale.product.name}}</h4>
    <h6 class="card-title">{{sale.price}}--->{{sale.quantity}} adet satildi </h6>
    

 
  </div>

  
 {% empty %}
    <li>Hiçbir kayıt bulunamadı.</li>
  {% endfor %}
{% endblock content %}
